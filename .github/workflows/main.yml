name: Unity CI

on: [push, pull_request, workflow_dispatch]

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Delete huge unnecessary tools folder
        run: rm -rf /opt/hostedtoolcache

      # Checkout (without LFS)
      - name: Checkout repository
        uses: actions/checkout@v6

      # Git LFS
      - name: Create LFS file list
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id

      - name: Restore LFS cache
        uses: actions/cache@v5
        id: lfs-cache
        with:
          path: .git/lfs
          key: ${{ runner.os }}-lfs-${{ hashFiles('.lfs-assets-id') }}

      - name: Git LFS Pull
        run: |
          git lfs pull
          git add .
          git reset --hard

      # Cache
      - uses: actions/cache@v5
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      # Build
      - name: Build Linux project
        uses: game-ci/unity-builder@v4.8.1
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          allowDirtyBuild: true
          targetPlatform: StandaloneLinux64
          buildName: HNode
          buildsPath: Builds

      - name: Upload Linux Portable Build
        uses: actions/upload-artifact@v7
        with:
          name: Linux Portable Build
          path: Builds/StandaloneLinux64

  build-windows:
    name: Build Windows
    runs-on: ubuntu-latest
    steps:
      - name: Delete huge unnecessary tools folder
        run: rm -rf /opt/hostedtoolcache
        
      # Checkout (without LFS)
      - name: Checkout repository
        uses: actions/checkout@v6

      # Git LFS
      - name: Create LFS file list
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id

      - name: Restore LFS cache
        uses: actions/cache@v5
        id: lfs-cache
        with:
          path: .git/lfs
          key: ${{ runner.os }}-lfs-${{ hashFiles('.lfs-assets-id') }}

      - name: Git LFS Pull
        run: |
          git lfs pull
          git add .
          git reset --hard

      # Cache
      - uses: actions/cache@v5
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      # Test
#      - name: Run tests
#        uses: game-ci/unity-test-runner@v2
#        env:
#          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
#        with:
#          githubToken: ${{ secrets.GITHUB_TOKEN }}

      # Build
      - name: Build Windows project
        uses: game-ci/unity-builder@v4.8.1
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          allowDirtyBuild: true
          targetPlatform: StandaloneWindows64
          buildName: HNode
          buildsPath: Builds

      # Output
      - name: Upload Windows Portable Build
        uses: actions/upload-artifact@v7
        with:
          name: Windows Portable Build
          path: Builds/StandaloneWindows64
      
      # Get nsis
      - name: Install NSIS
        run: |
          sudo apt-get -y update
          sudo apt-get -y install nsis

      # run NSIS installer script for windows builds
      - name: NSIS Installer
        uses: joncloud/makensis-action@v5.0
        with:
          script-file: .github/scripts/installer.nsi
      
      # Upload installer
      - name: Upload Windows Installer
        uses: actions/upload-artifact@v7
        with:
          name: Windows Installer
          path: .github/scripts/HNode setup.exe
